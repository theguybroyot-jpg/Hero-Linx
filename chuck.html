<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Chuck</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#090909;
color:white;
}

header{
background:#111;
padding:20px;
text-align:center;
font-size:32px;
font-weight:bold;
}

.player{
width:100%;
height:70vh;
background:black;
}

iframe{
width:100%;
height:100%;
border:none;
}

.controls{

display:flex;
justify-content:center;
align-items:center;
gap:20px;

padding:30px;
flex-wrap:wrap;

background:#111;

}

label{

font-size:20px;

}

select{

padding:10px 20px;

font-size:18px;

border:none;

border-radius:10px;

background:#222;

color:white;

}

button{

padding:12px 25px;

font-size:18px;

border:none;

border-radius:10px;

background:#4b6fff;

color:white;

cursor:pointer;

}

button:hover{

background:#7390ff;

}

.info{

padding:30px;

max-width:900px;

margin:auto;

}

</style>

</head>

<body>

<header>

Chuck

</header>

<div class="player">

<iframe
id="player"
src="https://vidsrc.mov/embed/tv/tt0934814/1/1"
allowfullscreen>
</iframe>

</div>

<div class="controls">

<label>

Season

<select id="season">

<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>

</select>

</label>

<label>

Episode

<select id="episode">

</select>

</label>

<button onclick="loadEpisode()">

Watch

</button>

</div>

<div class="info">

<h2>Chuck</h2>

<p>
A computer geek accidentally downloads government secrets into his brain and becomes an unlikely spy.
</p>

</div>

<script>

const episodeSelect=document.getElementById("episode");

function fillEpisodes(){

episodeSelect.innerHTML="";

for(let i=1;i<=24;i++){

episodeSelect.innerHTML+=`<option>${i}</option>`;

}

}

fillEpisodes();

function loadEpisode(){

const season=document.getElementById("season").value;

const episode=document.getElementById("episode").value;

document.getElementById("player").src=
`https://vidsrc.mov/embed/tv/tt0934814/${season}/${episode}`;

}

</script>

</body>
</html>
