<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Movie</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#090909;
color:white;
}

.loading{

position:fixed;
inset:0;
background:#090909;
display:flex;
justify-content:center;
align-items:center;
font-size:32px;
z-index:9999;

}

.loading.hidden{
display:none;
}


.hero{

min-height:70vh;
padding:50px;
display:flex;
align-items:end;

background-size:cover;
background-position:center;

}


.heroContent{

display:flex;
gap:30px;
align-items:end;
flex-wrap:wrap;

}


.poster{

width:230px;
border-radius:15px;

}


.details{

max-width:700px;

}


.details h1{

font-size:55px;
margin-bottom:15px;

}


.meta{

display:flex;
gap:20px;
flex-wrap:wrap;
margin-bottom:20px;

}


.overview{

font-size:18px;
line-height:1.6;

}


.button{

padding:14px 25px;
background:#333;
color:white;
border:0;
border-radius:10px;
cursor:pointer;
margin-top:20px;

}


.player{

height:70vh;
margin:30px;
background:black;
border-radius:15px;
overflow:hidden;

}


.player iframe{

width:100%;
height:100%;
border:0;

}


.section{

padding:30px;

}


.cards{

display:flex;
gap:20px;
overflow-x:auto;

}


.card{

min-width:160px;
background:#151515;
padding:10px;
border-radius:12px;
cursor:pointer;

}


.card img{

width:100%;
border-radius:10px;

}


.card p{

margin-top:10px;

}


</style>

</head>


<body>


<div id="loading" class="loading">

Loading Movie...

</div>


<div class="hero" id="hero">


<div class="heroContent">


<img id="poster" class="poster">


<div class="details">


<h1 id="title">

Loading...

</h1>


<div class="meta">

<span id="year"></span>

<span id="rating"></span>

<span id="runtime"></span>

</div>


<p id="overview" class="overview">

</p>


<button class="button" onclick="scrollToPlayer()">

▶ Watch Trailer

</button>


</div>


</div>


</div>


<div class="player" id="playerContainer">

<iframe id="player" allowfullscreen></iframe>

</div>


<div class="section">

<h2>Recommended Movies</h2>

<div id="recommendations" class="cards"></div>

</div>


<div class="section">

<h2>Trailer</h2>

<div id="trailer"></div>

</div><script>

const API_KEY = "bb33aa47807eec85db1687412383c855";


const movieID = new URLSearchParams(window.location.search).get("id");


if(!movieID){

document.body.innerHTML = 
"<h1 style='padding:40px'>Missing Movie ID</h1>";

throw new Error("Missing movie ID");

}



async function loadMovie(){


try{


const response = await fetch(

`https://api.themoviedb.org/3/movie/${movieID}?api_key=${API_KEY}&append_to_response=videos`

);



const movie = await response.json();



document.title = movie.title;



document.getElementById("title").innerHTML =
movie.title;



document.getElementById("poster").src =

"https://image.tmdb.org/t/p/w500" + movie.poster_path;



document.getElementById("overview").innerHTML =

movie.overview || "No description available.";



document.getElementById("year").innerHTML =

"📅 " + movie.release_date;



document.getElementById("rating").innerHTML =

"⭐ " + movie.vote_average.toFixed(1) + "/10";



let hours = Math.floor(movie.runtime / 60);

let minutes = movie.runtime % 60;



document.getElementById("runtime").innerHTML =

"⏱ " + hours + "h " + minutes + "m";




document.getElementById("hero").style.backgroundImage =

`
linear-gradient(
rgba(0,0,0,.4),
rgba(9,9,9,1)
),
url(
https://image.tmdb.org/t/p/original${movie.backdrop_path}
)
`;





// Trailer


let trailer = movie.videos.results.find(video =>

video.site === "YouTube"

&&

video.type === "Trailer"

);



if(trailer){


document.getElementById("trailer").innerHTML =

`

<iframe

width="100%"

height="400"

src="https://www.youtube.com/embed/${trailer.key}"

allowfullscreen>

</iframe>

`;

}




document.getElementById("loading")

.classList.add("hidden");



loadRecommendations();



}



catch(error){


console.log(error);


document.getElementById("loading").innerHTML =

"Failed To Load Movie";


}


}






async function loadRecommendations(){



try{


const response = await fetch(

`https://api.themoviedb.org/3/movie/${movieID}/similar?api_key=${API_KEY}&language=en-US`

);



const data = await response.json();



const container =

document.getElementById("recommendations");



data.results.slice(0,12).forEach(movie => {



let card = document.createElement("div");


card.className = "card";



card.innerHTML =


`

<img src="

${
movie.poster_path

?

"https://image.tmdb.org/t/p/w300"+movie.poster_path

:

"https://placehold.co/300x450"

}

">


<p>

${movie.title}

</p>

`;



card.onclick = function(){


window.location.href =

"movie.html?id=" + movie.id;


};



container.appendChild(card);



});



}

catch(error){

console.log(

"Recommendation error",

error

);

}



}





document.getElementById("poster").onerror=function(){


this.src=

"https://placehold.co/500x750/111111/ffffff?text=No+Poster";


};





function scrollToPlayer(){


document.getElementById("playerContainer")

.scrollIntoView({

behavior:"smooth"

});


}





function fullscreenPlayer(){


let player =

document.getElementById("playerContainer");



if(player.requestFullscreen){

player.requestFullscreen();

}


}



loadMovie();


</script> </body>

</html>
